name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run tests
        run: go test ./...

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t echo-logger:${{ github.sha }} .

  migrate-lint:
    name: Migration Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ariga/setup-atlas@v0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install Ent
        run: go mod download

      - name: Check migration files use LF line endings
        run: |
          bad_files=""
          for f in migrations/*.sql; do
            [ -f "$f" ] || continue
            if grep -Prl '\r\n' "$f" 2>/dev/null; then
              bad_files="$bad_files $f"
            fi
          done
          if [ -n "$bad_files" ]; then
            echo "ERROR: CRLF line endings found in:$bad_files"
            exit 1
          fi
          echo "All migration files use LF line endings."

      - name: Validate migrations
        run: atlas migrate validate --dir file://migrations

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [build, migrate-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up --build -d

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/ > /dev/null 2>&1; then
              echo "App is ready"
              exit 0
            fi
            echo "Waiting for app... ($i/30)"
            sleep 2
          done
          echo "App failed to start"
          docker compose logs
          exit 1

      - name: Test echo endpoint (GET)
        run: |
          response=$(curl -sf http://localhost:8080/hello)
          echo "$response"
          echo "$response" | jq -e '.method == "GET"'
          echo "$response" | jq -e '.path == "/hello"'

      - name: Test echo endpoint (POST)
        run: |
          response=$(curl -sf -X POST http://localhost:8080/api/data \
            -H "Content-Type: application/json" \
            -d '{"test":"value"}')
          echo "$response"
          echo "$response" | jq -e '.method == "POST"'
          echo "$response" | jq -e '.body == "{\"test\":\"value\"}"'

      - name: Test requests list endpoint
        run: |
          response=$(curl -sf http://localhost:8080/requests)
          echo "$response"
          count=$(echo "$response" | jq 'length')
          echo "Logged requests: $count"
          [ "$count" -ge 2 ] || (echo "Expected at least 2 logged requests" && exit 1)

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down -v
